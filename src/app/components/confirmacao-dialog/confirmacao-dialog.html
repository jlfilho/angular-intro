<h2 mat-dialog-title>Confirmar remoção</h2>

<mat-dialog-content>
  <p>Deseja realmente remover esta tarefa?</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button
    mat-button
    type="button"
    [mat-dialog-close]="false"
  >
    Cancelar
  </button>

  <button
    mat-raised-button
    color="warn"
    type="button"
    [mat-dialog-close]="true"
  >
    Remover
  </button>
</mat-dialog-actions>
